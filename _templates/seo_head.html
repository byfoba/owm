<!--
  SEO Head Template - inversiones.ortega.id
  ==========================================
  
  INSTRUCCIONES PARA EL COPYWRITER:
  1. Reemplazar todos los placeholders {{NOMBRE}} con el contenido apropiado
  2. Los placeholders están marcados con doble llave {{ }}
  3. No modificar la estructura HTML, solo el contenido entre comillas
  
  PLACEHOLDERS DISPONIBLES:
  - {{META_TITLE}}: Título SEO de la página (máx. 60 caracteres)
  - {{META_DESCRIPTION}}: Descripción SEO (máx. 160 caracteres)
  - {{PAGE_PATH}}: Ruta de la página (ej: /servicios/gestion-de-portafolio/)
  - {{OG_IMAGE}}: Nombre del archivo de imagen OG (ej: og-gestion-portafolio.jpg)
  - {{CANONICAL_URL}}: URL canónica completa
-->

<!-- ===== META TAGS BÁSICOS ===== -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{META_DESCRIPTION}}">
<meta name="keywords" content="asesor financiero, inversiones Argentina, CNV, gestión de capital, Balanz, Ezequiel Ortega, asesor CNV, finanzas personales, {{ADDITIONAL_KEYWORDS}}">
<meta name="author" content="Ezequiel Ortega">
<meta name="robots" content="index, follow">

<!-- ===== CANONICAL ===== -->
<link rel="canonical" href="https://inversiones.ortega.id{{PAGE_PATH}}">

<!-- ===== TITLE ===== -->
<title>{{META_TITLE}}</title>

<!-- ===== FAVICON ===== -->
<link rel="icon" href="/images/favicon-32x32.png" type="image/x-icon">
<link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

<!-- ===== OPEN GRAPH ===== -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Ezequiel Ortega - Asesor Financiero">
<meta property="og:title" content="{{META_TITLE}}">
<meta property="og:description" content="{{META_DESCRIPTION}}">
<meta property="og:image" content="https://inversiones.ortega.id/assets/og/{{OG_IMAGE}}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="{{META_TITLE}}">
<meta property="og:url" content="https://inversiones.ortega.id{{PAGE_PATH}}">
<meta property="og:locale" content="es_AR">

<!-- ===== TWITTER CARD ===== -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{META_TITLE}}">
<meta name="twitter:description" content="{{META_DESCRIPTION}}">
<meta name="twitter:image" content="https://inversiones.ortega.id/assets/og/{{OG_IMAGE}}">

<!-- ===== PRECONNECT PARA PERFORMANCE ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.googletagmanager.com">
<link rel="dns-prefetch" href="https://www.google-analytics.com">
